<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    
  <filter id="f" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="25" result="n"/>
    <feColorMatrix in="n" type="saturate" values="0" result="g"/>
    <feComponentTransfer in="g" result="c">
      <feFuncA type="linear" slope="0.5" intercept="-0.05"/>
    </feComponentTransfer>
    <feComposite in="c" in2="SourceGraphic" operator="over"/>
  </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="#b7b8b4" filter="url(#f)"/>
  <rect width="1600" height="1200" fill="url(#sheen)"/>
</svg>